name: Supply Chain Scan

on:
  workflow_call:
    inputs:
      scan_profile:
        type: string
        default: 'project'

jobs:
  bumblebee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Install Bumblebee
        run: go install github.com/perplexityai/bumblebee/cmd/bumblebee@latest

      - name: Fetch exposure catalog
        run: |
          curl -sSL https://raw.githubusercontent.com/mumzworld-tech/security-workflows/main/catalogs/exposure-catalog.json -o catalog.json

      - name: Run scan
        id: scan
        run: |
          # Scan lockfiles with Bumblebee
          bumblebee scan --profile ${{ inputs.scan_profile }} --root . --exposure-catalog catalog.json --findings-only > findings.ndjson 2>/dev/null || true
          
          # Also scan package.json files for catalog entries (catches declared but not-yet-installed packages)
          CATALOG_PACKAGES=$(cat catalog.json | grep -o '"package": "[^"]*"' | cut -d'"' -f4)
          for pkg in $CATALOG_PACKAGES; do
            FOUND=$(grep -rl "\"$pkg\"" . --include="package.json" --include="composer.json" --include="go.mod" 2>/dev/null | grep -v node_modules | grep -v vendor)
            if [ -n "$FOUND" ]; then
              for f in $FOUND; do
                echo "{\"record_type\":\"finding\",\"package_name\":\"$pkg\",\"source_file\":\"$f\",\"ecosystem\":\"npm\",\"confidence\":\"high\"}" >> findings.ndjson
              done
            fi
          done

          if [ -s findings.ndjson ]; then
            echo "status=FAIL" >> $GITHUB_OUTPUT
            FINDING_COUNT=$(wc -l < findings.ndjson)
            echo "findings=$FINDING_COUNT" >> $GITHUB_OUTPUT
            PACKAGES=$(grep -o '"package_name":"[^"]*"' findings.ndjson | cut -d'"' -f4 | sort -u | tr '\n' ', ' | sed 's/,$//')
            FILES=$(grep -o '"source_file":"[^"]*"' findings.ndjson | cut -d'"' -f4 | sort -u | tr '\n' ', ' | sed 's/,$//')
            echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
            echo "::error::Exposed packages found: $PACKAGES in $FILES"
            cat findings.ndjson
          else
            echo "status=PASS" >> $GITHUB_OUTPUT
            echo "findings=0" >> $GITHUB_OUTPUT
            echo "packages=" >> $GITHUB_OUTPUT
            echo "✅ No exposed packages found"
          fi

      - name: Publish scan result
        if: always()
        run: |
          REPO="${{ github.repository }}"
          STATUS="${{ steps.scan.outputs.status }}"
          FINDINGS="${{ steps.scan.outputs.findings }}"
          PACKAGES="${{ steps.scan.outputs.packages }}"
          SHA="${{ github.sha }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "{\"repo\":\"$REPO\",\"status\":\"$STATUS\",\"findings\":$FINDINGS,\"packages\":\"$PACKAGES\",\"sha\":\"${SHA::8}\",\"run_url\":\"$RUN_URL\",\"timestamp\":\"$TIMESTAMP\"}" > scan-result.json
          cat scan-result.json

      - name: Upload scan result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-scan-result
          path: scan-result.json
          retention-days: 90

      - name: Fail if exposed
        if: steps.scan.outputs.status == 'FAIL'
        run: exit 1
